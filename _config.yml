          - Gained hands-on experience in computer architecture, software engineering, and data structures through course projects and labs.
          - Completed flagship systems courses ([CMU15-213](https://csapp.cs.cmu.edu/), [CMU15-445](https://15445.courses.cs.cmu.edu/), [MIT6.S081](https://pdos.csail.mit.edu/6.828/), [MIT6.824](https://pdos.csail.mit.edu/6.824/)) with extensive hands-on exercises in OS, databases, and distributed systems.

  - title: Experience
    layout: list # Type of content section (list/text)
    content:
      - layout: left
        title: Yaspeed
        link: https://www.yaspeed.com/
        sub_title: Software Engineer
        caption: Apr. 2025 - Present
        description: |
          - GPU-Accelerated Query Execution Engine
            - Designed and implemented GPU-aware execution pipelines for SQL operators, including `GROUP BY`, `WHERE IN`, and `set operations`, enabling efficient host-device co-execution.
            - Built vectorized aggregation and filtering logic on GPU, improving parallelism and reducing CPU-side bottlenecks in query execution.
            - Optimized data movement between CPU and GPU to minimize transfer overhead in large-scale workloads.
          - Optimization of Correlated Subqueries (`WHERE EXISTS`)
            - Implemented a decorrelation strategy for EXISTS subqueries based on the paper “[Unnesting Arbitrary Queries](https://15799.courses.cs.cmu.edu/spring2025/papers/11-unnesting/neumann-btw2015.pdf)”.
            - Rewrote correlated subqueries into join-based execution plans (e.g., `CROSS JOIN` + `LEFT ANY JOIN`) to eliminate per-row subquery execution.
            - Adapted the rewritten plans to fit GPU execution constraints, improving performance for complex nested queries.
          - [cuDF](https://github.com/rapidsai/cudf) Migration to [ROCm](https://github.com/ROCm/rocm) Platform
            - Ported key components of the cuDF framework from CUDA to the ROCm ecosystem.
            - Resolved compatibility issues in GPU memory management and kernel execution, improving portability across GPU vendors.
            - Contributed to enabling vendor-agnostic GPU data processing pipelines.

      - layout: left
        title: MacroSAN
        link: https://www.macrosan.com
        sub_title: Software Engineer
        caption: Jul. 2023 - Feb. 2024
        description: |
          - Samba Protocol Development:
            - Hardened the [Samba protocol](https://www.samba.org/) stack for enterprise NAS/storage deployments, boosting throughput and reliability at scale.
            - Redesigned persistent handle reconnection and failover flows to sharply reduce deadlock-related errors during client switchover.


