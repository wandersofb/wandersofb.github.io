---
layout: blog_default
---
<article class="container blog-container">
  <header class="blog-post-header">
    <h1 class="blog-post-title">{{ page.title }}</h1>
    <p class="blog-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y-%m-%d" }}</time>
      {%- if page.tags and page.tags.size > 0 -%}
        <span class="blog-tags">· {{ page.tags | join: " · " }}</span>
      {%- endif -%}
    </p>
  </header>

  <div class="blog-post-content">
    {{ content }}
  </div>

  <p class="blog-back">
    <a href="{{ '/blog/' | relative_url }}">← Back to all posts</a>
  </p>
</article>
